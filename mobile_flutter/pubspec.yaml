name: mobile_flutter
description: Outdoor reminder simulation client
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  firebase_core: ^3.4.0
  flutter_tts: ^4.0.2
  vibration: ^2.0.0
  flutter_blue_plus: ^1.32.12
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3
  workmanager: ^0.6.0
  flutter_local_notifications: ^17.2.3
  firebase_messaging: ^15.1.3
  timezone: ^0.9.4
  android_alarm_manager_plus: ^4.0.8
  speech_to_text: ^7.0.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
