org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=false
# Workaround: this project lives on D:\ but the Pub cache is on C:\ which makes
# Kotlin's incremental compiler crash with
# "IllegalArgumentException: this and base files have different roots".
# Disabling incremental compilation is the supported fix when the build sources
# span multiple Windows drive letters.
kotlin.incremental=false
